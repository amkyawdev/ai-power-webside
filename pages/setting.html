<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>amkyaw.dev - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; }
        
        .settings-container { max-width: 800px; margin: 0 auto; padding: 30px; }
        
        .settings-header { text-align: center; margin-bottom: 40px; }
        .settings-header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        
        .settings-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.2); }
        
        .settings-title { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* Avatar Selection */
        .avatar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .avatar-item { text-align: center; cursor: pointer; padding: 10px; border-radius: 10px; transition: all 0.3s; }
        .avatar-item:hover { background: rgba(255,255,255,0.2); }
        .avatar-item.selected { background: linear-gradient(45deg, #667eea, #764ba2); }
        .avatar-item img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 3px solid transparent; }
        .avatar-item.selected img { border-color: white; }
        
        /* Form Styles */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; font-size: 16px; }
        input::placeholder { color: rgba(255,255,255,0.7); }
        input:focus, select:focus { outline: none; background: rgba(255,255,255,0.3); }
        
        /* Toggle Switch */
        .toggle-switch { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: linear-gradient(45deg, #667eea, #764ba2); }
        input:checked + .slider:before { transform: translateX(26px); }
        
        /* Language Selector */
        .language-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .language-btn { padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; cursor: pointer; transition: all 0.3s; text-align: center; }
        .language-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .language-btn.active { background: linear-gradient(45deg, #667eea, #764ba2); border-color: white; }
        
        .save-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 20px; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5); }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1>Settings</h1>
            <p>Customize your experience</p>
        </div>
        
        <!-- Profile Settings -->
        <div class="settings-card">
            <div class="settings-title">
                <i class="fas fa-user"></i>
                Profile Settings
            </div>
            
            <!-- Avatar Selection -->
            <h3 style="margin-bottom: 15px;">Choose Avatar</h3>
            <div class="avatar-grid" id="avatarGrid">
                <div class="avatar-item selected" onclick="selectAvatar(1)">
                    <img src="../img/user-1.svg" alt="Avatar 1">
                    <div>Avatar 1</div>
                </div>
                <div class="avatar-item" onclick="selectAvatar(2)">
                    <img src="../img/user-2.svg" alt="Avatar 2">
                    <div>Avatar 2</div>
                </div>
                <div class="avatar-item" onclick="selectAvatar(3)">
                    <img src="../img/user-3.svg" alt="Avatar 3">
                    <div>Avatar 3</div>
                </div>
                <div class="avatar-item" onclick="selectAvatar(4)">
                    <img src="../img/user-4.svg" alt="Avatar 4">
                    <div>Avatar 4</div>
                </div>
                <div class="avatar-item" onclick="selectAvatar(5)">
                    <img src="../img/user-5.svg" alt="Avatar 5">
                    <div>Avatar 5</div>
                </div>
            </div>
            
            <!-- Personal Info -->
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Enter your name" value="John Doe">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" value="user@example.com" readonly>
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                    <option value="prefer-not">Prefer not to say</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Bio</label>
                <input type="text" id="bio" placeholder="Tell us about yourself">
            </div>
        </div>
        
        <!-- Appearance Settings -->
        <div class="settings-card">
            <div class="settings-title">
                <i class="fas fa-palette"></i>
                Appearance
            </div>
            
            <div class="toggle-switch">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="darkMode" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="toggle-switch">
                <span>Compact View</span>
                <label class="switch">
                    <input type="checkbox" id="compactView">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <!-- Language Settings -->
        <div class="settings-card">
            <div class="settings-title">
                <i class="fas fa-language"></i>
                Language
            </div>
            
            <div class="language-grid" id="languageGrid">
                <div class="language-btn active" onclick="selectLanguage('en')">English</div>
                <div class="language-btn" onclick="selectLanguage('my')">Myanmar</div>
                <div class="language-btn" onclick="selectLanguage('th')">Thai</div>
                <div class="language-btn" onclick="selectLanguage('zh')">Chinese</div>
                <div class="language-btn" onclick="selectLanguage('ru')">Russian</div>
            </div>
        </div>
        
        <!-- Save Button -->
        <button class="save-btn" onclick="saveSettings()">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </div>
    
    <script src="../js/setting.js"></script>
</body>
</html>
