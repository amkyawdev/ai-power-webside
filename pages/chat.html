<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>amkyaw.dev - AI Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        .chat-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header (same as dashboard) */
        .header { height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; padding: 0 20px; color: white; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .menu-toggle { display: none; font-size: 24px; cursor: pointer; }
        .logo { font-size: 24px; font-weight: 700; }
        .header-nav { display: flex; gap: 15px; margin-left: 40px; }
        .header-nav .text-btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .header-nav .text-btn:hover { background: rgba(255,255,255,0.2); }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
        .user-icon { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(45deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .chat-sidebar { width: 300px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.2); padding: 20px; overflow-y: auto; }
        .new-chat-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 10px; color: white; font-size: 16px; cursor: pointer; margin-bottom: 20px; transition: all 0.3s; }
        .new-chat-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .history-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s; color: white; }
        .history-item:hover { background: rgba(255,255,255,0.1); border-radius: 8px; }
        
        /* Chat Content */
        .chat-content { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; }
        .message { margin-bottom: 20px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message-content { max-width: 70%; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; }
        .message.user .message-content { background: linear-gradient(45deg, #667eea, #764ba2); }
        .message.bot .message-content { background: rgba(255,255,255,0.2); }
        
        /* Chat Input */
        .chat-input-area { padding: 20px; background: rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2); }
        .input-wrapper { display: flex; gap: 10px; align-items: flex-end; }
        textarea { flex: 1; padding: 15px; border: none; border-radius: 10px; background: rgba(255,255,255,0.2); color: white; resize: none; max-height: 150px; font-size: 16px; }
        textarea::placeholder { color: rgba(255,255,255,0.7); }
        .upload-btn, .send-btn { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: all 0.3s; }
        .upload-btn:hover, .send-btn:hover { transform: scale(1.1); }
        
        /* Tabs */
        .chat-tabs { display: flex; gap: 10px; padding: 20px 20px 0; }
        .tab { padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 10px 10px 0 0; cursor: pointer; color: white; transition: all 0.3s; }
        .tab.active { background: rgba(255,255,255,0.2); border-bottom: 2px solid #667eea; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .header-nav { display: none; }
            .chat-sidebar { position: fixed; left: -300px; top: 70px; height: calc(100vh - 70px); transition: left 0.3s; z-index: 100; }
            .chat-sidebar.open { left: 0; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="logo">amkyaw.dev</div>
                <div class="header-nav">
                    <div class="text-btn" onclick="navigate('dashboard')">Dashboard</div>
                    <div class="text-btn" onclick="navigate('chat')">Chat</div>
                    <div class="text-btn" onclick="navigate('coder')">Coder</div>
                </div>
            </div>
            <div class="header-right">
                <div class="text-btn" onclick="window.location.href='../auth/login.html'">Login</div>
                <div class="user-icon" onclick="navigate('settings')"><i class="fas fa-user"></i></div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="chat-tabs">
            <div class="tab active" onclick="switchTab('chat')">Chat</div>
            <div class="tab" onclick="switchTab('coder')">Coder</div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <!-- Sidebar -->
            <div class="chat-sidebar" id="chatSidebar">
                <button class="new-chat-btn" onclick="newChat()">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <div class="history-item">
                    <i class="fas fa-comment"></i> Project discussion
                </div>
                <div class="history-item">
                    <i class="fas fa-comment"></i> Code review
                </div>
                <div class="history-item">
                    <i class="fas fa-comment"></i> Bug fix help
                </div>
            </div>
            
            <!-- Chat Content -->
            <div class="chat-content">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <div class="message-content">
                            Hello! How can I help you today?
                        </div>
                    </div>
                </div>
                
                <!-- Input Area -->
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <div class="upload-btn" onclick="uploadFile()">
                            <i class="fas fa-paperclip"></i>
                        </div>
                        <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                        <div class="send-btn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Hidden file input -->
    <input type="file" id="fileUpload" style="display: none;" multiple>
    
    <script src="../js/chat.js"></script>
</body>
</html>
