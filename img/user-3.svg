<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ed8936;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:1" />
        </linearGradient>
        <clipPath id="circleView3">
            <circle cx="50" cy="50" r="45"/>
        </clipPath>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="48" fill="url(#grad3)" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Hair - Long -->
    <path d="M30 25 Q50 8, 70 25 L68 45 Q50 30, 32 45 Z" fill="#8b5a2b"/>
    <path d="M25 45 Q50 60, 75 45" fill="#8b5a2b"/>
    <path d="M30 50 Q50 70, 70 50" fill="#8b5a2b"/>
    
    <!-- Face -->
    <circle cx="50" cy="55" r="28" fill="#f1d592" clip-path="url(#circleView3)"/>
    
    <!-- Eyes - Large -->
    <circle cx="38" cy="52" r="5" fill="#2c3e50"/>
    <circle cx="62" cy="52" r="5" fill="#2c3e50"/>
    <circle cx="40" cy="50" r="2" fill="white"/>
    <circle cx="64" cy="50" r="2" fill="white"/>
    
    <!-- Eyebrows - Thin -->
    <path d="M32 44 Q40 42, 44 44" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
    <path d="M56 44 Q60 42, 68 44" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
    
    <!-- Nose -->
    <path d="M48 58 L52 58" stroke="#b38b6d" stroke-width="2"/>
    
    <!-- Mouth - Wide Smile -->
    <path d="M38 68 Q50 78, 62 68" stroke="#b34b4b" stroke-width="3" fill="none"/>
    
    <!-- Blush -->
    <circle cx="32" cy="62" r="4" fill="#fc8181" opacity="0.3"/>
    <circle cx="68" cy="62" r="4" fill="#fc8181" opacity="0.3"/>
    
    <!-- Hair Band -->
    <rect x="35" y="35" width="30" height="8" rx="4" fill="#f56565"/>
    
    <!-- Shirt -->
    <path d="M40 83 L50 90 L60 83 L60 97 L40 97 Z" fill="#553c9a"/>
    <circle cx="50" cy="92" r="3" fill="#fbbf24"/>
</svg>