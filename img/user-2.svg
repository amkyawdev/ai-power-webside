<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
        </linearGradient>
        <clipPath id="circleView2">
            <circle cx="50" cy="50" r="45"/>
        </clipPath>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="48" fill="url(#grad2)" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Hair - Short Style -->
    <path d="M30 25 Q50 5, 70 25 L68 30 Q50 15, 32 30 Z" fill="#4a2c2c"/>
    <path d="M35 30 L65 30 L62 40 L38 40 Z" fill="#4a2c2c"/>
    
    <!-- Face -->
    <circle cx="50" cy="55" r="28" fill="#f1d592" clip-path="url(#circleView2)"/>
    
    <!-- Eyes -->
    <ellipse cx="38" cy="52" rx="4" ry="5" fill="#2c3e50"/>
    <ellipse cx="62" cy="52" rx="4" ry="5" fill="#2c3e50"/>
    <circle cx="40" cy="50" r="1.5" fill="white"/>
    <circle cx="64" cy="50" r="1.5" fill="white"/>
    
    <!-- Eyebrows - Curved -->
    <path d="M32 44 Q40 40, 44 44" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <path d="M56 44 Q60 40, 68 44" stroke="#2c3e50" stroke-width="2" fill="none"/>
    
    <!-- Nose -->
    <circle cx="50" cy="58" r="2" fill="#b38b6d"/>
    
    <!-- Mouth - Neutral -->
    <path d="M42 65 Q50 68, 58 65" stroke="#b34b4b" stroke-width="3" fill="none"/>
    
    <!-- Earrings -->
    <circle cx="30" cy="58" r="3" fill="#f6ad55"/>
    <circle cx="70" cy="58" r="3" fill="#f6ad55"/>
    
    <!-- Shirt with Collar -->
    <path d="M40 82 L50 88 L60 82 L60 95 L40 95 Z" fill="#2c5282"/>
    <path d="M45 82 L50 85 L55 82" fill="#2a4365"/>
</svg>