<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
        </linearGradient>
        <clipPath id="circleView">
            <circle cx="50" cy="50" r="45"/>
        </clipPath>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="48" fill="url(#grad1)" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Hair -->
    <path d="M30 25 Q50 10, 70 25 L68 35 Q50 22, 32 35 Z" fill="#2c3e50"/>
    
    <!-- Face -->
    <circle cx="50" cy="55" r="28" fill="#f1d592" clip-path="url(#circleView)"/>
    
    <!-- Eyes -->
    <circle cx="38" cy="50" r="4" fill="#2c3e50"/>
    <circle cx="62" cy="50" r="4" fill="#2c3e50"/>
    <circle cx="40" cy="48" r="1.5" fill="white"/>
    <circle cx="64" cy="48" r="1.5" fill="white"/>
    
    <!-- Eyebrows -->
    <path d="M32 42 Q38 38, 44 42" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <path d="M56 42 Q62 38, 68 42" stroke="#2c3e50" stroke-width="2" fill="none"/>
    
    <!-- Nose -->
    <path d="M48 55 Q50 60, 52 55" stroke="#b38b6d" stroke-width="2" fill="none"/>
    
    <!-- Mouth - Smile -->
    <path d="M40 65 Q50 75, 60 65" stroke="#b34b4b" stroke-width="3" fill="none"/>
    
    <!-- Glasses (Optional - remove if not wanted) -->
    <!-- 
    <circle cx="38" cy="50" r="6" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="62" cy="50" r="6" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="44" y1="50" x2="56" y2="50" stroke="#333" stroke-width="2"/>
    -->
    
    <!-- Shirt Collar -->
    <path d="M40 80 L50 85 L60 80 L58 90 L42 90 Z" fill="#4a5568"/>
</svg>